<!doctype html>
<html><head><meta charset="utf-8"><title>RUNNING</title></head><body>
<iframe id="app" src="../index.html" hidden></iframe><pre id="result">RUNNING</pre>
<script>
document.getElementById("app").addEventListener("load", () => {
  const frame = document.getElementById("app"), win = frame.contentWindow, api = win.BoltzmannLab, inference = win.BoltzmannInference, checks = [];
  const check = (name, pass) => checks.push([name, Boolean(pass)]);
  try {
    check("initialized weights and biases", api.state.weights.length === 100 && api.state.biases.length === 10);
    const beforeWeights = Array.from(api.state.weights), beforeBiases = Array.from(api.state.biases);
    for (let step = 0; step < 5; step += 1) api.trainStep();
    check("RBM advances epochs", api.state.epoch === 5);
    check("RBM updates weights", beforeWeights.some((value, index) => value !== api.state.weights[index]));
    check("RBM updates biases", beforeBiases.some((value, index) => value !== api.state.biases[index]));

    const frozenWeights = Array.from(api.state.weights), frozenBiases = Array.from(api.state.biases);
    const rbmResult = inference.runInference();
    check("RBM reconstruction distribution", rbmResult.distribution.rows.length === 64 && rbmResult.distribution.method.includes("reconstruction") && Math.abs(rbmResult.probabilitySum - 1) < 1e-10);
    check("RBM inference preserves parameters", frozenWeights.every((value, index) => value === api.state.weights[index]) && frozenBiases.every((value, index) => value === api.state.biases[index]));
    check("posterior and reconstruction exposed", rbmResult.conditional.hidden.length === 4 && rbmResult.conditional.reconstructed.length === 6);
    frame.contentDocument.querySelector("#inferenceBits button").click();
    check("input edit invalidates stale inference", inference.state.result === null && frame.contentDocument.getElementById("drawInferenceSample").disabled && frame.contentDocument.getElementById("probabilitySum").textContent === "0.000000");
    inference.runInference();
    frame.contentDocument.getElementById("reset").click();
    check("network reset invalidates stale inference", inference.state.result === null && frame.contentDocument.getElementById("drawInferenceSample").disabled && !frame.contentDocument.getElementById("inferenceStatus").textContent.includes("Inference complete"));
    api.resetNetwork();
    api.state.weights.fill(0);
    api.state.biases.fill(-2);
    api.state.biases[0] = -4;
    api.state.biases[api.state.visible] = -4;
    const stateSize = api.state.visible + api.state.hidden, hidden0 = api.state.visible;
    api.state.weights[api.index(0, hidden0, stateSize)] = 8;
    api.state.weights[api.index(hidden0, 0, stateSize)] = 8;
    inference.state.input = [1, 0, 0, 0, 0, 0];
    const clampedOnTop = inference.runInference().distribution.rows[0].label;
    inference.state.input = [0, 0, 0, 0, 0, 0];
    const clampedOffTop = inference.runInference().distribution.rows[0].label;
    check("clamped input changes most likely states", clampedOnTop !== clampedOffTop && clampedOnTop === "100000" && clampedOffTop === "000000");

    frame.contentDocument.getElementById("model").value = "bm";
    api.resetNetwork();
    const bmBefore = Array.from(api.state.weights);
    api.trainStep();
    check("full BM advances", api.state.epoch === 1);
    check("full BM updates weights", bmBefore.some((value, index) => value !== api.state.weights[index]));
    const bmResult = inference.runInference();
    check("full BM reconstruction ranking", bmResult.distribution.representedStates === 64 && bmResult.distribution.method.includes("full-BM") && Math.abs(bmResult.probabilitySum - 1) < 1e-10);
    frame.contentDocument.getElementById("visibleCount").value = "12";
    frame.contentDocument.getElementById("hiddenCount").value = "10";
    frame.contentDocument.getElementById("inferenceBurnIn").value = "0";
    frame.contentDocument.getElementById("inferenceSamples").value = "100";
    api.resetNetwork();
    inference.state.input = Array(12).fill(0);
    const sampledResult = inference.runInference();
    check("large full BM uses normalized reconstruction ranking", sampledResult.distribution.method.includes("full-BM") && Math.abs(sampledResult.probabilitySum - 1) < 1e-10);
    frame.contentDocument.getElementById("model").value = "rbm";
    frame.contentDocument.getElementById("visibleCount").value = "6";
    frame.contentDocument.getElementById("hiddenCount").value = "4";
    api.resetNetwork();
    inference.state.input = Array(6).fill(0);
    frame.contentDocument.getElementById("activationCode").value = "function activation(sum, temperature) { return sum / temperature > 0 ? 0.9 : 0.1; }";
    frame.contentDocument.getElementById("applyCode").click();
    const customResult = inference.runInference();
    check("custom activation uses reconstruction ranking", customResult.distribution.method.includes("custom activation") && Math.abs(customResult.probabilitySum - 1) < 1e-10);
    check("canvases and inference UI rendered", frame.contentDocument.getElementById("network").width > 300 && frame.contentDocument.querySelectorAll("#distribution .distribution-row").length > 0);
    frame.contentDocument.getElementById("resetCode").click();
    check("energy finite", Number.isFinite(api.energy()));
    check("custom compiler", api.compileFunction("function activation(x,t){return x+t;}", "activation")(2,3) === 5);
    const ok = checks.every((item) => item[1]);
    document.getElementById("result").textContent = (ok ? "PASS" : "FAIL") + "\n" + checks.map((item) => (item[1] ? "PASS " : "FAIL ") + item[0]).join("\n");
    document.title = ok ? "PASS" : "FAIL";
  } catch (error) { document.getElementById("result").textContent = "FAIL\n" + error.stack; document.title = "FAIL"; }
}, { once:true });
</script></body></html>
