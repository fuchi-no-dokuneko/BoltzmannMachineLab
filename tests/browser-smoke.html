<!doctype html><html><head><meta charset="utf-8"><title>RUNNING</title></head><body><iframe id="app" src="../index.html" hidden></iframe><pre id="result">RUNNING</pre><script>document.getElementById("app").addEventListener("load",()=>{const frame=document.getElementById("app"),win=frame.contentWindow,api=win.BoltzmannLab,checks=[];const check=(n,p)=>checks.push([n,!!p]);try{check("initialized",api.state.weights.length===100);const before=Array.from(api.state.weights);for(let i=0;i<5;i++)api.trainStep();check("RBM advances epochs",api.state.epoch===5);check("RBM updates weights",before.some((v,i)=>v!==api.state.weights[i]));frame.contentDocument.getElementById("model").value="bm";api.resetNetwork();const bmBefore=Array.from(api.state.weights);api.trainStep();check("full BM advances",api.state.epoch===1);check("full BM updates weights",bmBefore.some((v,i)=>v!==api.state.weights[i]));check("energy finite",Number.isFinite(api.energy()));check("canvas painted",frame.contentDocument.getElementById("network").width>300);check("custom compiler",api.compileFunction("function activation(x,t){return x+t;}","activation")(2,3)===5);const ok=checks.every(x=>x[1]);document.getElementById("result").textContent=(ok?"PASS":"FAIL")+"\n"+checks.map(x=>(x[1]?"PASS ":"FAIL ")+x[0]).join("\n");document.title=ok?"PASS":"FAIL"}catch(e){document.getElementById("result").textContent="FAIL\n"+e.stack;document.title="FAIL"}},{once:true});</script></body></html>
